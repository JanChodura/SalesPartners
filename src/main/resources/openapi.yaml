openapi: 3.0.3
info:
  title: Sales Partner API
  version: 1.0.0
  description: API for managing sales partners and their contacts

servers:
  - url: http://localhost:8080/api

tags:
  - name: partners
    description: Operations related to partners

paths:

  /partners:
    post:
      tags:
        - partners
      summary: Create partner
      operationId: createPartner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePartnerRequest'
            example:
              name: Acme s.r.o.
              identifiers:
                - value: CZ12345678
                  type: ICO
                - value: CZ12345678
                  type: VAT
              addresses:
                - country: CZ
                  city: Prague
                  zipCode: "11000"
                  street: Wenceslas Square
                  streetNumber: "1"
      responses:
        '201':
          description: Partner created
          headers:
            Location:
              description: URL of the created partner
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerDetailResponse'
              example:
                id: 1
                name: Acme s.r.o.
                partnerStatus: NEW
                identifiers:
                  - value: CZ12345678
                    type: ICO
                  - value: CZ12345678
                    type: VAT
                addresses:
                  - country: CZ
                    city: Prague
                    zipCode: "11000"
                    street: Wenceslas Square
                    streetNumber: "1"
                contacts: []

    get:
      tags:
        - partners
      summary: Get all partners
      operationId: getPartners
      responses:
        '200':
          description: List of partners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PartnerListItem'
              example:
                - id: 1
                  name: Acme s.r.o.
                  partnerStatus: NEW
                - id: 2
                  name: Globex a.s.
                  partnerStatus: GOLD
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /partners/{partnerId}:
    get:
      tags:
        - partners
      summary: Get partner detail
      operationId: getPartnerDetail
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Partner detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerDetailResponse'
              example:
                id: 1
                name: Acme s.r.o.
                partnerStatus: GOLD
                identifiers:
                  - value: CZ12345678
                    type: ICO
                  - value: CZ12345678
                    type: VAT
                addresses:
                  - country: CZ
                    city: Prague
                    zipCode: "11000"
                    street: Wenceslas Square
                    streetNumber: "1"
                contacts:
                  - id: 10
                    firstName: Jan
                    lastName: Novak
                    position: SALES
                    primary: true
                    countryCallingCode: "+420"
                    phoneNumber: "777888999"
                    email: jan.novak@acme.example
        '404':
          description: Partner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - partners
      summary: Update partner
      operationId: updatePartner
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePartnerRequest'
            example:
              name: Acme Enterprise s.r.o.
              partnerStatus: GOLD
              identifiers:
                - value: CZ12345678
                  type: ICO
                - value: CZ12345678
                  type: VAT
              addresses:
                - country: CZ
                  city: Brno
                  zipCode: "60200"
                  street: Ceska
                  streetNumber: "15"
      responses:
        '200':
          description: Partner updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerDetailResponse'
              example:
                id: 1
                name: Acme Enterprise s.r.o.
                partnerStatus: GOLD
                identifiers:
                  - value: CZ12345678
                    type: ICO
                  - value: CZ12345678
                    type: VAT
                addresses:
                  - country: CZ
                    city: Brno
                    zipCode: "60200"
                    street: Ceska
                    streetNumber: "15"
                contacts:
                  - id: 10
                    firstName: Jan
                    lastName: Novak
                    position: ACCOUNT_MANAGER
                    primary: true
                    countryCallingCode: "+420"
                    phoneNumber: "777888999"
                    email: jan.novak@acme.example
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Partner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /partners/{partnerId}/contacts:
    post:
      tags:
        - partners
      summary: Add contact to partner
      operationId: addContact
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactRequest'
            example:
              firstName: Jan
              lastName: Novak
              position: SALES
              isPrimary: true
              countryCallingCode: "+420"
              phoneNumber: "777888999"
              email: jan.novak@acme.example
      responses:
        '201':
          description: Contact created
          headers:
            Location:
              description: URL of the created contact
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
              example:
                id: 10
                firstName: Jan
                lastName: Novak
                position: SALES
                primary: true
                countryCallingCode: "+420"
                phoneNumber: "777888999"
                email: jan.novak@acme.example
        '404':
          description: Partner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /partners/{partnerId}/contacts/{contactId}:
    put:
      tags:
        - partners
      summary: Update contact
      operationId: updateContact
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContactRequest'
            example:
              firstName: Petr
              lastName: Svoboda
              position: ACCOUNT_MANAGER
              isPrimary: false
              countryCallingCode: "+420"
              phoneNumber: "111222333"
              email: petr.svoboda@acme.example
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
              example:
                id: 10
                firstName: Petr
                lastName: Svoboda
                position: ACCOUNT_MANAGER
                primary: false
                countryCallingCode: "+420"
                phoneNumber: "111222333"
                email: petr.svoboda@acme.example
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - partners
      summary: Remove or deactivate contact
      operationId: deleteContact
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Contact removed or deactivated
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  schemas:

    PartnerListItem:
      type: object
      required: [ id, name, partnerStatus ]
      example:
        id: 1
        name: Acme s.r.o.
        partnerStatus: NEW
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Acme s.r.o.
        partnerStatus:
          $ref: '#/components/schemas/PartnerStatus'

    PartnerDetailResponse:
      type: object
      required: [ id, name, partnerStatus ]
      example:
        id: 1
        name: Acme s.r.o.
        partnerStatus: NEW
        identifiers:
          - value: CZ12345678
            type: ICO
        addresses:
          - country: CZ
            city: Prague
            zipCode: "11000"
            street: Wenceslas Square
            streetNumber: "1"
        contacts:
          - id: 10
            firstName: Jan
            lastName: Novak
            position: SALES
            primary: true
            countryCallingCode: "+420"
            phoneNumber: "777888999"
            email: jan.novak@acme.example
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Acme s.r.o.
        partnerStatus:
          $ref: '#/components/schemas/PartnerStatus'
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactResponse'

    CreatePartnerRequest:
      type: object
      required: [name]
      example:
        name: Acme s.r.o.
        identifiers:
          - value: CZ12345678
            type: ICO
        addresses:
          - country: CZ
            city: Prague
            zipCode: "11000"
            street: Wenceslas Square
            streetNumber: "1"
      properties:
        name:
          type: string
          example: Acme s.r.o.
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'

    UpdatePartnerRequest:
      allOf:
        - $ref: '#/components/schemas/CreatePartnerRequest'
        - type: object
          properties:
            partnerStatus:
              $ref: '#/components/schemas/PartnerStatus'

    ContactResponse:
      type: object
      required: [id, firstName, lastName]
      example:
        id: 10
        firstName: Jan
        lastName: Novak
        position: SALES
        primary: true
        countryCallingCode: "+420"
        phoneNumber: "777888999"
        email: jan.novak@acme.example
      properties:
        id:
          type: integer
          format: int64
          example: 10
        firstName:
          type: string
          example: Jan
        lastName:
          type: string
          example: Novak
        position:
          $ref: '#/components/schemas/ContactPosition'
        primary:
          type: boolean
          example: true
        countryCallingCode:
          type: string
          example: "+420"
        phoneNumber:
          type: string
          example: "777888999"
        email:
          type: string
          example: jan.novak@acme.example

    CreateContactRequest:
      type: object
      required: [firstName, lastName]
      example:
        firstName: Jan
        lastName: Novak
        position: SALES
        isPrimary: true
        countryCallingCode: "+420"
        phoneNumber: "777888999"
        email: jan.novak@acme.example
      properties:
        firstName:
          type: string
          example: Jan
        lastName:
          type: string
          example: Novak
        position:
          $ref: '#/components/schemas/ContactPosition'
        isPrimary:
          type: boolean
          example: true
        countryCallingCode:
          type: string
          example: "+420"
        phoneNumber:
          type: string
          example: "777888999"
        email:
          type: string
          example: jan.novak@acme.example

    UpdateContactRequest:
      $ref: '#/components/schemas/CreateContactRequest'

    Address:
      type: object
      required: [country, city]
      example:
        country: CZ
        city: Prague
        zipCode: "11000"
        street: Wenceslas Square
        streetNumber: "1"
      properties:
        country:
          type: string
          example: CZ
        city:
          type: string
          example: Prague
        zipCode:
          type: string
          example: "11000"
        street:
          type: string
          example: Wenceslas Square
        streetNumber:
          type: string
          example: "1"

    Identifier:
      type: object
      required: [value, type]
      example:
        value: CZ12345678
        type: ICO
      properties:
        value:
          type: string
          example: CZ12345678
        type:
          $ref: '#/components/schemas/IdentifierType'

    IdentifierType:
      type: string
      enum: [ICO, VAT, OTHER]

    ContactPosition:
      type: string
      enum: [EXECUTIVE, SALES, ACCOUNT_MANAGER, TECHNICAL, FINANCE, SUPPORT, OTHER]

    PartnerStatus:
      type: string
      enum: [NEW, STANDARD, GOLD, INACTIVE]

    ErrorResponse:
      type: object
      required: [ message ]
      example:
        message: Partner with id 999 was not found.
        code: PARTNER_NOT_FOUND
      properties:
        message:
          type: string
          example: Partner with id 999 was not found.
        code:
          type: string
          example: PARTNER_NOT_FOUND
